<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>

    <h1>Enter your pet details</h1>

    <form action="/pets/create" method="post">

        <label>Name:</label>
        <input type="text" name="name" required>
        <br><br>

        <label>Species:</label>
        <input type="text" name="species" required>
        <br><br>

        <label>Breed:</label>
        <input type="text" name="breed" required>
        <br><br>
        
        <label>Age:</label>
        <input type="number" name="age" required>
        <br><br>

        <label>Owner_Name:</label>
        <input type="text" name="owner_name" required>
        <br><br>

        <label>Owner_Phone:</label>
        <input type="text" name="owner_phone" required>
        <br><br>

        <br><br>

        <button type="submit">Submit</button>
        <br>

    </form>


</body>
</html>
