<!DOCTYPE html>
<html>
<head>
    <title>Create Owner</title>
</head>
<body>

    <h1>Create Owner</h1>

    <form action="/owner/create" method="POST">

        <input
            type="text"
            name="name"
            placeholder="Owner Name"
            required
        >

        <br><br>

        <input
            type="text"
            name="phone"
            placeholder="Phone Number"
            required
        >

        <br><br>

        <input
            type="text"
            name="email"
            placeholder="Email"
            required
        >

        <br><br>

        <button type="submit">Create Owner</button>

    </form>

</body>
</html>
