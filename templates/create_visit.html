<!DOCTYPE html>
<html>
<head>
    <title>Create Visit</title>
</head>
<body>

    <h2>Create Pet Visit</h2>

    <form action="/pets/{{ pet_id }}/create_visits" method="post">

        <label>Pet ID:</label>
        <input type="number" name="pet_id" value="{{ pet_id }}" required>
        <br><br>

        <label>Reason:</label>
        <input type="text" name="reason" required>
        <br><br>

        <label>Notes:</label>
        <br>
        <textarea name="notes" rows="5" cols="40"></textarea>
        <br><br>

        <label>Visit Date:</label>
        <input type="date" name="visit_date" required>
        <br><br>

        <button type="submit">Create Visit</button>

    </form>

</body>
</html>
